<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tela Screen 2026</title>
    
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">

    <style>
        :root {
            --sidebar-width: 280px;
            --bg-dark: #000000;
            --led-blue: #00d2ff;
            --led-green: #22c55e;
            --accent: #2563eb;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
        }

        /* --- TELA DE FUNDO TOTAL --- */
        .main-view {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1; display: flex;
            align-items: center; justify-content: center;
            background: radial-gradient(circle, #0f172a 0%, #000 100%);
        }

        video { width: 100%; height: 100%; object-fit: contain; z-index: 2; position: absolute; }

        /* --- BOLINHA GIRANDO (SPINNER) --- */
        .loader-container {
            position: absolute; z-index: 3;
            display: flex; flex-direction: column; align-items: center;
        }

        .spinner {
            width: 45px; height: 45px;
            border: 3px solid rgba(0, 210, 255, 0.1);
            border-top: 3px solid var(--led-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Esconder loader quando o vídeo conectar */
        .connected .loader-container { display: none; }

        /* --- SETA LED AZUL (ABRIR) --- */
        .led-trigger-mini {
            position: fixed; top: 15px; left: 15px;
            width: 38px; height: 38px;
            background: #111827; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 101;
            border: 1px solid var(--led-blue);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .led-trigger-mini.open { left: calc(var(--sidebar-width) + 15px); transform: rotate(180deg); }

        /* --- SIDEBAR --- */
        .sidebar {
            position: fixed; top: 0; left: calc(-1 * var(--sidebar-width));
            width: var(--sidebar-width); height: 100%;
            background: #111827; z-index: 100;
            transition: left 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 70px 20px 20px 20px; box-sizing: border-box;
            border-right: 1px solid rgba(0, 210, 255, 0.2);
            overflow-y: auto;
        }

        .sidebar.open { left: 0; }

        /* --- BOTÃO X LED VERDE --- */
        .btn-green-x {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            background: rgba(34, 197, 94, 0.1); border: 1px solid var(--led-green);
            color: var(--led-green); padding: 12px; border-radius: 8px;
            cursor: pointer; font-size: 11px; font-weight: bold; margin-bottom: 10px;
        }

        /* --- NOME DO APLICATIVO --- */
        .app-name {
            color: var(--led-blue);
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-style: italic;
        }

        /* ID CARD */
        .id-card {
            background: #070b14; padding: 15px; border-radius: 10px;
            text-align: center; border: 1px solid #1e293b; margin-bottom: 25px;
        }

        /* INPUTS E BOTÕES */
        input {
            width: 100%; padding: 12px; background: #070b14;
            border: 1px solid #1e293b; color: white; border-radius: 8px;
            margin-bottom: 10px; box-sizing: border-box; outline: none;
        }

        .btn-primary {
            width: 100%; padding: 12px; background: var(--accent);
            color: white; border: none; border-radius: 8px;
            font-weight: bold; cursor: pointer; margin-bottom: 30px;
        }

        .contact-item {
            background: #1e293b; padding: 12px; border-radius: 8px;
            margin-top: 10px; display: flex; justify-content: space-between;
            align-items: center; font-size: 13px; border-left: 3px solid var(--led-green);
        }

        .btn-view {
            background: var(--led-green); border: none; color: white;
            padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 10px;
        }
    </style>
</head>
<body>

    <div class="led-trigger-mini" id="menuBtn" onclick="toggleSidebar()">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="var(--led-blue)"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"></path></svg>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="btn-green-x" onclick="toggleSidebar()">
            <svg viewBox="0 0 24 24" width="18" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"></path></svg>
            VOLTAR PARA TELA
        </div>

        <div class="app-name">Tela Screen</div>

        <div class="id-card">
            <span style="color: #64748b; font-size: 10px;">SEU ID DE ACESSO:</span><br>
            <strong id="my-id-display" style="color: var(--led-blue); font-size: 18px;">...</strong>
        </div>

        <p style="font-size: 10px; color: #64748b; text-transform: uppercase;">Adicionar Novo Dispositivo</p>
        <input type="text" id="newFriendId" placeholder="Digite o ID do amigo">
        <button class="btn-primary" onclick="saveFriend()">SALVAR NA LISTA</button>

        <div id="friendsList">
            <p style="font-size: 10px; color: #64748b; text-transform: uppercase;">IDs Salvos</p>
        </div>
    </div>

    <div class="main-view" id="displayArea">
        <div class="loader-container">
            <div class="spinner"></div>
            <p style="color: #1e293b; font-size: 9px; margin-top: 15px; letter-spacing: 2px;">SINCRONIZANDO</p>
        </div>
        <video id="remoteVideo" autoplay playsinline onplay="document.getElementById('displayArea').classList.add('connected')"></video>
    </div>

    <script>
        // --- CONEXÃO COM O MOTOR NO RENDER ---
        const socket = io('https://tela-screen-api.onrender.com');

        const sidebar = document.getElementById('sidebar');
        const menuBtn = document.getElementById('menuBtn');

        // 1. GERAÇÃO E TRAVA DO ID ÚNICO
        let myId = localStorage.getItem('remote_id_2026');
        if(!myId) {
            myId = 'ID-' + Math.floor(Math.random() * 90000 + 10000);
            localStorage.setItem('remote_id_2026', myId);
        }
        document.getElementById('my-id-display').innerText = myId;

        // Entrar na sala do socket com o meu ID
        socket.emit('join-room', myId);

        // 2. FUNÇÕES DA BARRA LATERAL
        function toggleSidebar() {
            sidebar.classList.toggle('open');
            menuBtn.classList.toggle('open');
        }

        // 3. GERENCIAR IDS SALVOS
        let savedIds = JSON.parse(localStorage.getItem('saved_ids_list') || '[]');

        function saveFriend() {
            const input = document.getElementById('newFriendId');
            const id = input.value.trim();
            if(id && !savedIds.includes(id)) {
                savedIds.push(id);
                localStorage.setItem('saved_ids_list', JSON.stringify(savedIds));
                renderFriends();
                input.value = '';
            }
        }

        function renderFriends() {
            const listDiv = document.getElementById('friendsList');
            listDiv.innerHTML = '<p style="font-size: 10px; color: #64748b; text-transform: uppercase;">IDs Salvos</p>';
            
            savedIds.forEach(id => {
                const item = document.createElement('div');
                item.className = 'contact-item';
                item.innerHTML = `
                    <span>${id}</span>
                    <button class="btn-view" onclick="connectTo('${id}')">VER AGORA</button>
                `;
                listDiv.appendChild(item);
            });
        }

        function connectTo(targetId) {
            alert("Solicitando visão de: " + targetId);
            socket.emit('request-connection', { to: targetId, from: myId });
        }

        // Iniciar a lista ao carregar
        renderFriends();
    </script>
</body>
</html>
